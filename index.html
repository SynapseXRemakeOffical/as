<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrimp's Stuff — Webhook Sender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0d0f;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: #ffffff12;
    --border2: #ffffff22;
    --accent: #58b9ff;
    --accent2: #a78bfa;
    --green: #3effa0;
    --red: #ff5c6a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, #58b9ff0a 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, #a78bfa0a 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .header {
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 24px #58b9ff28;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .card-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-header .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .card-header span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field label .required {
    color: var(--accent);
    font-size: 12px;
    line-height: 1;
  }

  input[type="text"], input[type="url"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    resize: vertical;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #58b9ff18;
  }

  .version-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 2px solid var(--accent);
  }

  .hint .g { color: var(--green); }
  .hint .r { color: var(--red); }

  textarea {
    min-height: 120px;
    line-height: 1.7;
  }

  .preview-box {
    background: #2b2d31;
    border-radius: 10px;
    border-left: 4px solid #58b9ff;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.8;
    display: none;
    flex-direction: column;
    gap: 2px;
  }

  .preview-box.visible { display: flex; }
  .prev-title { color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 6px; font-family: var(--sans); }
  .prev-section { color: #80848e; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; margin: 8px 0 3px; }
  .prev-ls { color: #5cdaad; }
  .prev-add { color: #57f287; }
  .prev-rem { color: #ed4245; }
  .prev-footer { color: #4e5058; font-size: 10px; margin-top: 8px; }

  .sep { height: 1px; background: var(--border); margin: 4px 0; }

  .send-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: opacity .15s, transform .15s, box-shadow .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 24px #58b9ff28;
    margin-top: 4px;
  }

  .send-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 32px #58b9ff38; }
  .send-btn:active { transform: scale(.98); }
  .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  .send-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity: 0;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px #00000060;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success .t-dot { background: var(--green); }
  .toast.error .t-dot { background: var(--red); }
  .toast .t-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .advanced-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    transition: color .15s;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
  }

  .advanced-toggle:hover { color: var(--text); }

  .chevron {
    margin-left: auto;
    transition: transform .2s;
    font-size: 12px;
  }

  .chevron.open { transform: rotate(180deg); }

  .advanced-fields {
    display: none;
    padding: 0 16px 16px;
    flex-direction: column;
    gap: 14px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }

  .advanced-fields.open { display: flex; }

  .char-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    background: #58b9ff18;
    color: var(--accent);
    border: 1px solid #58b9ff30;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">🦐</div>
      <h1>Shrimp's <span>Stuff</span></h1>
    </div>
    <p>// WEBHOOK SENDER — COMPONENTS V2</p>
  </div>

  <div class="card">
    <div class="card-header"><div class="dot"></div><span>Webhook target</span></div>
    <div class="card-body">
      <div class="field">
        <label>Webhook URL <span class="required">*</span></label>
        <input type="url" id="wh-url" placeholder="https://discord.com/api/webhooks/..." autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="dot" style="background:var(--accent2);box-shadow:0 0 8px var(--accent2)"></div><span>Update info</span></div>
    <div class="card-body">
      <div class="version-row">
        <div class="field">
          <label>Version <span class="required">*</span></label>
          <input type="text" id="ver" placeholder="v1.4.2" spellcheck="false">
        </div>
        <div class="field">
          <label>Ping role ID</label>
          <input type="text" id="role-id" value="1490281705842671646" spellcheck="false">
        </div>
      </div>
      <div class="field">
        <label>Changelog <span class="required">*</span></label>
        <div class="hint">
          <span class="g">+ added something</span><br>
          <span class="r">- removed something</span><br>
          just type it, no diff header needed
        </div>
        <textarea id="cl" placeholder="+ Added new feature&#10;- Removed old thing&#10;+ Fixed crash on start"></textarea>
        <div class="char-count" id="cl-count">0 lines</div>
      </div>
    </div>
    <button class="advanced-toggle" onclick="toggleAdv()" id="adv-btn">
      Advanced settings
      <span class="chevron" id="chevron">▾</span>
    </button>
    <div class="advanced-fields" id="adv-fields">
      <div class="field">
        <label>Loadstring URL</label>
        <input type="url" id="ls-url" value="https://vexbin.lol/view/p/04b18f15" spellcheck="false">
      </div>
      <div class="field">
        <label>Banner image URL</label>
        <input type="url" id="img-url" placeholder="https://cdn.discordapp.com/..." spellcheck="false">
      </div>
      <div class="field">
        <label>Footer text</label>
        <input type="text" id="footer" value="Project Lexia — Made by Shrimper and Ale.">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div class="dot" style="background:var(--green);box-shadow:0 0 8px var(--green)"></div><span>Preview</span></div>
    <div class="card-body" id="preview-wrap">
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:8px 0">
        Fill in version &amp; changelog to see preview
      </div>
    </div>
  </div>

  <button class="send-btn" id="send-btn" onclick="send()">
    <span class="spinner" id="spinner"></span>
    <span id="btn-label">Send Update</span>
  </button>
</div>

<div class="toast" id="toast">
  <div class="t-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
const $ = id => document.getElementById(id);

function parseChangelog(raw) {
  return raw.trim().split('\n').map(l => {
    const t = l.trim();
    if (!t) return null;
    if (t.startsWith('+ ')) return { type: 'add', text: t.slice(2) };
    if (t.startsWith('- ')) return { type: 'rem', text: t.slice(2) };
    if (t.startsWith('+')) return { type: 'add', text: t.slice(1).trim() };
    if (t.startsWith('-')) return { type: 'rem', text: t.slice(1).trim() };
    return { type: 'neutral', text: t };
  }).filter(Boolean);
}

function buildDiffStr(raw) {
  return parseChangelog(raw).map(e => {
    if (e.type === 'add') return `+ ${e.text}`;
    if (e.type === 'rem') return `- ${e.text}`;
    return `  ${e.text}`;
  }).join('\n');
}

function updatePreview() {
  const ver = $('ver').value.trim();
  const cl = $('cl').value.trim();
  const url = $('ls-url').value.trim();
  const footer = $('footer').value.trim();
  const lines = parseChangelog(cl);
  const wrap = $('preview-wrap');

  $('cl-count').textContent = lines.length + ' line' + (lines.length !== 1 ? 's' : '');

  if (!ver && !cl) {
    wrap.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:8px 0">Fill in version &amp; changelog to see preview</div>';
    return;
  }

  const clHtml = lines.map(e => {
    const cls = e.type === 'add' ? 'prev-add' : e.type === 'rem' ? 'prev-rem' : '';
    const prefix = e.type === 'add' ? '+ ' : e.type === 'rem' ? '- ' : '  ';
    return `<span class="${cls}">${prefix}${esc(e.text)}</span>`;
  }).join('\n');

  wrap.innerHTML = `
    <div style="background:#2b2d31;border-radius:8px;border-left:4px solid #58b9ff;padding:12px 14px;display:flex;flex-direction:column;gap:2px">
      <div class="prev-title">🦐 Shrimp's Stuff — ${esc(ver)}</div>
      <div style="color:#80848e;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 3px">Script</div>
      <span class="prev-ls" style="font-family:var(--mono);font-size:11px">loadstring(game:HttpGet("${esc(url)}"))()</span>
      <div class="sep"></div>
      <div style="color:#80848e;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Change logs</div>
      <pre style="font-family:var(--mono);font-size:11px;line-height:1.7;white-space:pre-wrap">${clHtml}</pre>
      <div class="prev-footer">${esc(footer)}</div>
    </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildPayload() {
  const ver   = $('ver').value.trim();
  const cl    = $('cl').value.trim();
  const url   = $('ls-url').value.trim();
  const img   = $('img-url').value.trim();
  const foot  = $('footer').value.trim();
  const role  = $('role-id').value.trim();
  const ls    = `loadstring(game:HttpGet("${url}"))()`;
  const diff  = buildDiffStr(cl);

  const comps = [
    {
      type: 12,
      components: [{ type: 9, content: `## Project Lexia\n**Script Update! — ${ver}**` }]
    },
    { type: 13, divider: true, spacing: 1 },
    { type: 9, content: `### Script\n\`\`\`lua\n${ls}\n\`\`\`` },
    { type: 13, divider: true, spacing: 1 },
    { type: 9, content: `### Change logs\n\`\`\`diff\n${diff}\n\`\`\`` }
  ];

  if (img) comps.push({ type: 14, items: [{ media: { url: img } }] });
  comps.push({ type: 13, divider: false, spacing: 1 });
  comps.push({ type: 9, content: `-# ${foot}` });

  const payload = {
    content: role ? `<@&${role}> Script Update!` : 'Script Update!',
    flags: 32768,
    components: [{ type: 17, accent_color: 5814783, components: comps }]
  };

  if (role) payload.allowed_mentions = { roles: [role] };
  return payload;
}

function showToast(msg, type = 'success') {
  const t = $('toast');
  $('toast-msg').textContent = msg;
  t.className = `toast ${type}`;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

async function send() {
  const whUrl = $('wh-url').value.trim();
  const ver   = $('ver').value.trim();
  const cl    = $('cl').value.trim();

  if (!whUrl)  { showToast('Enter a webhook URL', 'error'); return; }
  if (!ver)    { showToast('Enter a version tag', 'error'); return; }
  if (!cl)     { showToast('Changelog is empty', 'error'); return; }
  if (!whUrl.startsWith('https://discord.com/api/webhooks/')) {
    showToast('That doesn\'t look like a Discord webhook URL', 'error'); return;
  }

  const btn = $('send-btn');
  $('spinner').style.display = 'block';
  $('btn-label').textContent = 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch(whUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildPayload())
    });

    if (res.ok || res.status === 204) {
      showToast('Update sent successfully!', 'success');
      $('cl').value = '';
      $('ver').value = '';
      updatePreview();
    } else {
      const data = await res.json().catch(() => ({}));
      showToast(`Discord error ${res.status}: ${data.message || 'unknown'}`, 'error');
    }
  } catch (e) {
    showToast('Network error — check your webhook URL', 'error');
  } finally {
    $('spinner').style.display = 'none';
    $('btn-label').textContent = 'Send Update';
    btn.disabled = false;
  }
}

function toggleAdv() {
  const f = $('adv-fields');
  const c = $('chevron');
  const open = f.classList.toggle('open');
  c.classList.toggle('open', open);
}

$('ver').addEventListener('input', updatePreview);
$('cl').addEventListener('input', updatePreview);
$('ls-url').addEventListener('input', updatePreview);
$('img-url').addEventListener('input', updatePreview);
$('footer').addEventListener('input', updatePreview);

updatePreview();
</script>
</body>
</html>
